name: upload_release

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      # タグ（例: v1.2.0）から先頭の v を除いた値をプラグインバージョンとして使う。
      - name: Set version env
        run: |
          before="${{ github.event.release.tag_name }}"
          after="${before//v/}"
          echo "PLUGIN_VERSION=$after" >> $GITHUB_ENV

      # gradle.properties の VersionPlaceholder をリリースバージョンへ置換する。
      # これが plugin.yml の version に反映され、`ar info` で表示される（MineAuth と同じ方式）。
      - name: change plugin.yml version
        run: |
          echo "バージョンは ${{ env.PLUGIN_VERSION }} なのだ！"
          sed -i "s/VersionPlaceholder/${{ env.PLUGIN_VERSION }}/" ./gradle.properties

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Rename artifact
        run: mv ./build/libs/AdvanceRailway-${{ env.PLUGIN_VERSION }}-all.jar ./build/libs/AdvanceRailway_${{ env.PLUGIN_VERSION }}.jar

      - name: Upload release
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            ./build/libs/AdvanceRailway_${{ env.PLUGIN_VERSION }}.jar \
            --clobber
